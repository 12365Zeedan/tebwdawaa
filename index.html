      /* Inline critical CSS for fast initial paint */
      #root-loader{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8f9fa;font-family:system-ui,-apple-system,sans-serif}
      #root-loader .bar{width:200px;height:4px;background:#e5e7eb;border-radius:2px;overflow:hidden}
      #root-loader .bar::after{content:'';display:block;width:40%;height:100%;background:#6366f1;border-radius:2px;animation:load 1s ease-in-out infinite}
      @keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
    </style>
